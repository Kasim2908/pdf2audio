apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf2audio-deployment
  labels:
    app: pdf2audio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pdf2audio
  template:
    metadata:
      labels:
        app: pdf2audio
    spec:
      containers:
      - name: pdf2audio-container
        image: mohammadkasim/pdf2audio:latest
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"